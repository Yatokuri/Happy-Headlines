services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      articleservice1:
        condition: service_started
      articleservice2:
        condition: service_started
      articleservice3:
        condition: service_started

  articleservice1:
    build:
      context: .
      dockerfile: ./src/ArticleService/Dockerfile
    container_name: articleservice1
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RUN_DB_INIT: "true"
      ConnectionStrings__Redis: redis:6379,abortConnect=false
    depends_on:
      africa-db:
        condition: service_healthy
      antarctica-db:
        condition: service_healthy
      asia-db:
        condition: service_healthy
      europe-db:
        condition: service_healthy
      northamerica-db:
        condition: service_healthy
      southamerica-db:
        condition: service_healthy
      oceania-db:
        condition: service_healthy
      global-db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      seq:
        condition: service_started
      redis:
        condition: service_started

  articleservice2:
    build:
      context: .
      dockerfile: ./src/ArticleService/Dockerfile
    container_name: articleservice2
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RUN_DB_INIT: "false"
      ConnectionStrings__Redis: redis:6379,abortConnect=false
    depends_on:
      africa-db:
        condition: service_healthy
      antarctica-db:
        condition: service_healthy
      asia-db:
        condition: service_healthy
      europe-db:
        condition: service_healthy
      northamerica-db:
        condition: service_healthy
      southamerica-db:
        condition: service_healthy
      oceania-db:
        condition: service_healthy
      global-db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      seq:
        condition: service_started
      redis:
        condition: service_started

  articleservice3:
    build:
      context: .
      dockerfile: ./src/ArticleService/Dockerfile
    container_name: articleservice3
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      RUN_DB_INIT: "false"
      ConnectionStrings__Redis: redis:6379,abortConnect=false
    depends_on:
      africa-db:
        condition: service_healthy
      antarctica-db:
        condition: service_healthy
      asia-db:
        condition: service_healthy
      europe-db:
        condition: service_healthy
      northamerica-db:
        condition: service_healthy
      southamerica-db:
        condition: service_healthy
      oceania-db:
        condition: service_healthy
      global-db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      seq:
        condition: service_started
      redis:
        condition: service_started

  profanityservice:
    build:
      context: .
      dockerfile: ./src/ProfanityService/Dockerfile
    container_name: profanityservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5002:8080"
    depends_on:
      profanity-db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      seq:
        condition: service_started

  commentservice:
    build:
      context: .
      dockerfile: ./src/CommentService/Dockerfile
    container_name: commentservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5003:8080"
    depends_on:
      comment-db:
        condition: service_healthy
      profanityservice:
        condition: service_started
      otel-collector:
        condition: service_started
      seq:
        condition: service_started

  draftservice:
    build:
      context: .
      dockerfile: ./src/DraftService/Dockerfile
    container_name: draftservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5004:8080"
    depends_on:
      draft-db:
        condition: service_healthy
      otel-collector:
        condition: service_started
      seq:
        condition: service_started

  newsletterservice:
    build:
      context: .
      dockerfile: ./src/NewsletterService/Dockerfile
    container_name: newsletterservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5005:8080"
    depends_on:
      articleservice1:
        condition: service_started
      otel-collector:
        condition: service_started
      seq:
        condition: service_started

  publisherservice:
    build:
      context: .
      dockerfile: ./src/PublisherService/Dockerfile
    container_name: publisherservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5006:8080"
    depends_on:
      profanityservice:
        condition: service_started
      nginx:
        condition: service_started
      otel-collector:
        condition: service_started
      seq:
        condition: service_started

  seq:
    image: datalust/seq:latest
    container_name: seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:80"
  
  redis:
    image: redis:8.6
    container_name: redis
    ports:
      - "6379:6379"

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./monitoring/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      zipkin:
        condition: service_started

  africa-db: &article-db
    image: postgres:16
    environment:
      POSTGRES_DB: articles_africa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck: &postgres-healthcheck
      test: ["CMD-SHELL", "pg_isready -U postgres -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  antarctica-db:
    <<: *article-db
    environment:
      POSTGRES_DB: articles_antarctica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  asia-db:
    <<: *article-db
    environment:
      POSTGRES_DB: articles_asia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  europe-db:
    <<: *article-db
    environment:
      POSTGRES_DB: articles_europe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  northamerica-db:
    <<: *article-db
    environment:
      POSTGRES_DB: articles_northamerica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  southamerica-db:
    <<: *article-db
    environment:
      POSTGRES_DB: articles_southamerica
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  oceania-db:
    <<: *article-db
    environment:
      POSTGRES_DB: articles_oceania
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  global-db:
    <<: *article-db
    environment:
      POSTGRES_DB: articles_global
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  profanity-db:
    <<: *article-db
    environment:
      POSTGRES_DB: profanity_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  comment-db:
    <<: *article-db
    environment:
      POSTGRES_DB: comment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  draft-db:
    <<: *article-db
    environment:
      POSTGRES_DB: draft_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres